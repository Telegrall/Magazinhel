<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Магазин</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, sans-serif; }
        body { background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #03050b); color:#eef4ff; min-height:100vh; padding:12px; padding-bottom:80px; }
        .container { max-width:500px; margin:0 auto; }
        .login-card { background:rgba(31,44,56,0.9); border-radius:24px; padding:30px; border:1px solid #2b3b4c; text-align:center; margin-top:40px; }
        .login-card h1 { color:#2b9aff; margin-bottom:8px; }
        .login-card input { width:100%; padding:12px; margin-bottom:12px; background:#0e1621; border:1px solid #2b3b4c; border-radius:12px; color:#fff; }
        .login-card button { width:100%; padding:12px; background:#2b9aff; border:none; border-radius:12px; color:#fff; font-weight:600; cursor:pointer; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .header h1 { font-size:1.5rem; color:#2b9aff; }
        .btn-sm { padding:8px 16px; border-radius:20px; border:none; cursor:pointer; font-weight:600; font-size:0.8rem; }
        .btn-logout { background:#ff3b30; color:#fff; }
        .card { background:rgba(31,44,56,0.8); border-radius:20px; padding:16px; margin-bottom:12px; border:1px solid #2b3b4c; }
        .product-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #2b3b4c; }
        .btn { background:#2b9aff; border:none; border-radius:14px; padding:10px; color:#fff; font-weight:600; cursor:pointer; }
        .btn-small { padding:6px 12px; font-size:0.7rem; border-radius:10px; }
        .btn-danger { background:#ff3b30; }
        .input-field { width:60px; padding:6px; background:#0e1621; border:1px solid #2b3b4c; border-radius:8px; color:#fff; text-align:center; }
        .cart-total { margin-top:12px; padding-top:12px; border-top:1px solid #2b3b4c; font-weight:600; }
        .hidden { display:none !important; }
        .order-item { background:rgba(31,44,56,0.8); border-radius:16px; padding:14px; margin-bottom:10px; border:1px solid #2b3b4c; }
        .promo-field { display:flex; gap:8px; margin-bottom:12px; }
        .promo-field input { flex:1; padding:8px; background:#0e1621; border:1px solid #2b3b4c; border-radius:8px; color:#fff; }
        .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(31,44,56,0.95); border-top:1px solid #2b3b4c; display:flex; gap:8px; padding:10px 16px; z-index:50; }
        .bottom-btn { flex:1; text-align:center; padding:10px; border-radius:12px; background:#2b3b4c; border:none; color:#eef4ff; cursor:pointer; font-weight:500; font-size:0.75rem; }
        .bottom-btn.active { background:#2b9aff; }
        .store-badge { display:inline-block; padding:3px 8px; border-radius:8px; font-size:0.65rem; font-weight:600; }
        .store-open { background:#d4f5d4; color:#1a7a1a; }
        .store-closed { background:#ffe0e0; color:#c0392b; }
        .order-items { font-size:0.75rem; color:#8e9eae; margin-top:4px; }
    </style>
</head>
<body>
<div class="container" id="appRoot">
    <div id="loginScreen" class="login-card">
        <h1>Магазин</h1>
        <p style="color:#8e9eae; margin-bottom:20px;">Войдите, чтобы продолжить</p>
        <input type="text" id="cName" placeholder="Ваше имя">
        <input type="text" id="cPhone" placeholder="Номер телефона">
        <input type="text" id="cCardLast4" placeholder="Последние 4 цифры карты (если есть)" maxlength="4">
        <button onclick="clientLogin()">Войти</button>
    </div>

    <div id="mainScreen" class="hidden">
        <div class="header">
            <h1>Магазин</h1>
            <div><span id="storeStatusBadge"></span> <button class="btn-sm btn-logout" onclick="clientLogout()">Выйти</button></div>
        </div>
        <div id="ctabProducts"><div id="productsList"></div></div>
        <div id="ctabCart" class="hidden"><div id="cartContent"></div></div>
        <div id="ctabProfile" class="hidden"><div id="profileContent"></div></div>
    </div>
</div>

<div class="bottom-bar" id="clientBottomBar" style="display:none;">
    <button class="bottom-btn active" onclick="clientTab('products')">Товары</button>
    <button class="bottom-btn" onclick="clientTab('cart')">Корзина</button>
    <button class="bottom-btn" onclick="clientTab('profile')">Профиль</button>
</div>

<script>
    const SUPABASE_URL = "https://iiuahjmpszfcgtwapidt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iFYpqkv4D0qEOj4Dn1X9Nw_OH9d5Bji";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = JSON.parse(localStorage.getItem('store_client')||'null');
    let cart = JSON.parse(localStorage.getItem('store_cart')||'[]');
    let products = [];
    let storeConfig = { open: true, hours: '09:00 - 20:00', mapLink: '' };
    let discountPercent = 0;

    async function loadStoreConfig() {
        try { const { data } = await sb.from('store_config').select('*').eq('id', 1).single(); if (data) { storeConfig.open = data.open; storeConfig.hours = data.hours || '09:00 - 20:00'; storeConfig.mapLink = data.map_link || ''; } } catch(e) {}
        document.getElementById('storeStatusBadge').innerHTML = `<span class="store-badge ${storeConfig.open ? 'store-open' : 'store-closed'}">${storeConfig.open ? 'Открыто' : 'Закрыто'}</span>`;
    }
    async function loadProducts() { try { const { data } = await sb.from('store_products').select('*').order('code'); products = data || []; } catch(e) { products = []; } }

    function showMainScreen() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        document.getElementById('clientBottomBar').style.display = 'flex';
        loadStoreConfig(); loadProducts().then(renderProducts);
    }
    function showLoginScreen() {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('hidden');
        document.getElementById('clientBottomBar').style.display = 'none';
    }
    if (currentUser) { showMainScreen(); }

    async function clientLogin() {
        const name = document.getElementById('cName').value.trim();
        const phone = document.getElementById('cPhone').value.trim();
        const cardLast4 = document.getElementById('cCardLast4').value.trim();
        if (!name || !phone) return alert('Введите имя и телефон');
        currentUser = { name, phone, cardLast4 };
        localStorage.setItem('store_client', JSON.stringify(currentUser));
        showMainScreen();
    }
    function clientLogout() { currentUser = null; localStorage.removeItem('store_client'); showLoginScreen(); }

    function clientTab(tab) {
        document.querySelectorAll('.bottom-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.bottom-btn[onclick*="${tab}"]`).classList.add('active');
        document.getElementById('ctabProducts').classList.add('hidden');
        document.getElementById('ctabCart').classList.add('hidden');
        document.getElementById('ctabProfile').classList.add('hidden');
        if (tab==='products') { document.getElementById('ctabProducts').classList.remove('hidden'); renderProducts(); }
        if (tab==='cart') { document.getElementById('ctabCart').classList.remove('hidden'); renderCart(); }
        if (tab==='profile') { document.getElementById('ctabProfile').classList.remove('hidden'); renderProfile(); }
    }

    function renderProducts() {
        document.getElementById('productsList').innerHTML = products.length===0 ? '<p style="text-align:center;padding:20px;">Товары скоро появятся</p>' :
            products.map(p => `<div class="product-item"><div><b>#${p.code} ${p.name}</b><br><small>${p.price} руб | +${p.bonus_points||0} баллов</small></div><button class="btn btn-small" onclick="clientAddToCart('${p.code}')">В корзину</button></div>`).join('');
    }
    function clientAddToCart(code) {
        const p = products.find(pr => pr.code == code);
        if (!p || p.stock <= 0) return alert('Нет в наличии');
        const ex = cart.find(c => c.code == code);
        if (ex) { if (ex.qty >= p.stock) return alert('Больше нет'); ex.qty++; }
        else cart.push({ code: p.code, name: p.name, price: p.price, bonus: p.bonus_points||0, qty: 1 });
        localStorage.setItem('store_cart', JSON.stringify(cart)); alert('Добавлено');
    }

    function renderCart() {
        if (cart.length===0) { document.getElementById('cartContent').innerHTML = '<p style="text-align:center;padding:20px;">Корзина пуста</p>'; return; }
        let total = 0, totalBonus = 0;
        document.getElementById('cartContent').innerHTML = `
            <div class="promo-field"><input type="text" id="promoCode" placeholder="Промокод"><button class="btn btn-small" onclick="applyPromo()">Применить</button></div>
            ${cart.map((c,i) => { total += c.price * c.qty; totalBonus += (c.bonus||0) * c.qty;
                return `<div class="product-item"><div><b>#${c.code} ${c.name}</b><br>${c.price} x ${c.qty} = ${c.price*c.qty} руб</div>
                <div style="display:flex;gap:4px;align-items:center;"><input type="number" class="input-field" value="${c.qty}" min="1" onchange="clientUpdateQty(${i},this.value)"><button class="btn btn-small btn-danger" onclick="clientRemoveFromCart(${i})">X</button></div></div>`;
            }).join('')}
            <div class="cart-total">Сумма: ${total} руб | Баллов: +${totalBonus}</div>
            ${discountPercent > 0 ? `<div class="cart-total" style="color:#4bcb6e;">Скидка: ${discountPercent}%</div>` : ''}
            <div class="promo-field" style="margin-top:8px;"><label>Списать баллов:</label><input type="number" id="useBonus" placeholder="0" value="0" min="0"></div>
            <button class="btn" onclick="clientPlaceOrder()" style="margin-top:12px;">Заказать</button>`;
    }

    window.applyPromo = async function() {
        const code = document.getElementById('promoCode').value.trim();
        if (!code) return;
        const { data } = await sb.from('store_promos').select('*').eq('code', code).single();
        if (data) { discountPercent = data.discount; alert('Скидка '+discountPercent+'% применена!'); renderCart(); }
        else alert('Промокод не найден');
    };
    function clientUpdateQty(i, v) { v=parseInt(v); if(isNaN(v)||v<1) v=1; cart[i].qty=v; localStorage.setItem('store_cart',JSON.stringify(cart)); renderCart(); }
    function clientRemoveFromCart(i) { cart.splice(i,1); localStorage.setItem('store_cart',JSON.stringify(cart)); renderCart(); }

    async function clientPlaceOrder() {
        const items = cart.map(c => ({ product_code: c.code, product_name: c.name, quantity: c.qty, price: c.price }));
        let total = items.reduce((s, it) => s + it.price * it.quantity, 0);
        if (discountPercent > 0) total = Math.round(total * (1 - discountPercent / 100));
        const totalBonus = cart.reduce((s, c) => s + (c.bonus||0) * c.qty, 0);
        const pickupCode = Math.floor(100000 + Math.random() * 900000).toString();
        const useBonus = parseInt(document.getElementById('useBonus')?.value || 0) || 0;
        
        await sb.from('store_orders').insert({
            client_name: currentUser.name, client_phone: currentUser.phone, client_card: currentUser.cardLast4,
            items, total, total_bonus: totalBonus, status: 'new', pickup_code: pickupCode, use_bonus: useBonus
        });
        
        if (useBonus > 0 && currentUser.cardLast4) {
            try {
                const { data: client } = await sb.from('store_clients').select('*').ilike('card_number', '%'+currentUser.cardLast4).single();
                if (client) await sb.from('store_clients').update({ balance: Math.max(0, (client.balance||0) - useBonus) }).eq('id', client.id);
            } catch(e) {}
        }
        
        cart = []; discountPercent = 0; localStorage.removeItem('store_cart');
        showQRModal(pickupCode);
        renderCart();
    }

    function showQRModal(code) {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:200;';
        modal.innerHTML = `<div style="background:#1f2c38;border-radius:20px;padding:24px;text-align:center;max-width:300px;width:90%;"><h3 style="color:#2b9aff;">Заказ оформлен!</h3><p>Код:</p><div style="font-size:2rem;font-weight:bold;color:#fff;">${code}</div><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${code}" width="150"><p style="font-size:0.8rem;color:#8e9eae;">Покажите сотруднику</p><button class="btn" onclick="this.closest('div').parentElement.remove()">Закрыть</button></div>`;
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
        document.body.appendChild(modal);
    }

    async function renderProfile() {
        let clientInfo = { balance: 0, active: false, card_number: '' };
        if (currentUser.cardLast4) {
            const { data } = await sb.from('store_clients').select('*').ilike('card_number', '%'+currentUser.cardLast4).single();
            if (data) clientInfo = data;
        }
        const { data: orders } = await sb.from('store_orders').select('*').or(`client_phone.eq.${currentUser.phone},client_card.eq.${currentUser.cardLast4}`).order('created_at',{ascending:false});
        const allOrders = orders || [];

        document.getElementById('profileContent').innerHTML = `
            <div class="card">
                <p><b>Имя:</b> ${currentUser.name}</p><p><b>Телефон:</b> ${currentUser.phone}</p>
                ${clientInfo.card_number ? `<p><b>Карта:</b> ${clientInfo.card_number}</p><p><b>Баллы:</b> ${clientInfo.balance||0}</p><p><b>Статус:</b> ${clientInfo.active ? 'Активирована' : 'Не активирована'}</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${clientInfo.card_number}" width="100">` : `
                <p style="color:#8e9eae;">У вас пока нет карты.</p>
                <button class="btn" onclick="createCard()">Создать карту</button>
                <p style="font-size:0.7rem;color:#8e9eae;margin-top:8px;">Активация только в магазине.</p>`}
                ${storeConfig.mapLink ? `<a href="${storeConfig.mapLink}" target="_blank" class="btn btn-outline" style="display:block;text-align:center;margin-top:8px;">Место продажи</a>` : ''}
            </div>
            <h3>Мои заказы</h3>
            ${allOrders.length===0 ? '<p style="color:#8e9eae;">Нет заказов</p>' : allOrders.map(o => {
                const items = o.items || [];
                const itemsText = items.map(i => `#${i.product_code} ${i.product_name} x${i.quantity}`).join(', ');
                return `<div class="order-item"><b>${new Date(o.created_at).toLocaleString('ru')}</b><br>${o.total} руб | Баллы: +${o.total_bonus||0}<br><div class="order-items">${itemsText}</div>Статус: ${o.status}
                ${o.status==='ready' && o.pickup_code ? `<div style="margin-top:8px;"><b>Код: ${o.pickup_code}</b><br><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${o.pickup_code}" width="100"></div>` : ''}
                ${o.status==='done' ? `<button class="btn btn-small" onclick="rateOrder(${o.id})" style="margin-top:6px;">Оценить</button>` : ''}</div>`;
            }).join('')}
        `;
    }

    window.createCard = async function() {
        if (!currentUser || !currentUser.phone) return alert('Войдите в профиль');
        const cardNumber = '4276 ' + Math.random().toString().slice(2,6) + ' ' + Math.random().toString().slice(2,6) + ' ' + Math.random().toString().slice(2,6);
        await sb.from('store_clients').insert({ name: currentUser.name, phone: currentUser.phone, card_number: cardNumber, active: false, balance: 0 });
        currentUser.cardLast4 = cardNumber.slice(-4);
        localStorage.setItem('store_client', JSON.stringify(currentUser));
        alert('Карта создана! Последние 4 цифры: ' + currentUser.cardLast4 + '. Активируйте в магазине.');
        renderProfile();
    };

    window.rateOrder = async function(orderId) {
        const rating = prompt('Оцените заказ от 1 до 5:');
        if (!rating || isNaN(rating) || rating < 1 || rating > 5) return;
        await sb.from('store_orders').update({ rating: parseInt(rating) }).eq('id', orderId);
        alert('Спасибо за оценку!'); renderProfile();
    };
</script>
</body>
</html>
