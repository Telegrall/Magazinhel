<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Магазин — Для покупателей</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, sans-serif; }
        body { background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #03050b); color:#eef4ff; min-height:100vh; padding:12px; padding-bottom:30px; }
        .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .star { position:absolute; background:#fff; border-radius:50%; width:2px; height:2px; opacity:0; animation:twinkle 3s infinite alternate; }
        @keyframes twinkle { 0%{opacity:0;transform:scale(0.8);} 100%{opacity:1;transform:scale(1.2);} }
        .container { max-width:500px; margin:0 auto; position:relative; z-index:10; }
        .login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; }
        .login-card { background:rgba(31,44,56,0.9); border-radius:24px; padding:30px; width:100%; max-width:350px; border:1px solid #2b3b4c; text-align:center; }
        .login-card h1 { color:#2b9aff; margin-bottom:8px; }
        .login-card input { width:100%; padding:12px; margin-bottom:12px; background:#0e1621; border:1px solid #2b3b4c; border-radius:12px; color:#fff; }
        .login-card button { width:100%; padding:12px; background:#2b9aff; border:none; border-radius:12px; color:#fff; font-weight:600; cursor:pointer; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .header h1 { font-size:1.5rem; color:#2b9aff; }
        .btn-logout { background:#ff3b30; border:none; color:#fff; padding:8px 16px; border-radius:20px; cursor:pointer; font-weight:600; font-size:0.8rem; }
        .tabs { display:flex; gap:8px; margin-bottom:16px; }
        .tab { flex:1; text-align:center; padding:10px; background:rgba(31,44,56,0.8); border-radius:16px; cursor:pointer; font-weight:500; font-size:0.8rem; border:1px solid #2b3b4c; }
        .tab.active { background:#2b9aff; border-color:#2b9aff; }
        .card { background:rgba(31,44,56,0.8); border-radius:20px; padding:16px; margin-bottom:12px; border:1px solid #2b3b4c; }
        .product-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #2b3b4c; }
        .btn { background:#2b9aff; border:none; border-radius:14px; padding:10px; color:#fff; font-weight:600; cursor:pointer; }
        .btn-small { padding:6px 12px; font-size:0.7rem; border-radius:10px; }
        .input-field { width:60px; padding:6px; background:#0e1621; border:1px solid #2b3b4c; border-radius:8px; color:#fff; text-align:center; }
        .cart-total { margin-top:12px; padding-top:12px; border-top:1px solid #2b3b4c; font-weight:600; }
        .hidden { display:none !important; }
    </style>
</head>
<body>
<div class="stars" id="starsContainer"></div>

<div class="container">
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>Магазин</h1>
            <p style="color:#8e9eae; margin-bottom:20px;">Войдите, чтобы продолжить</p>
            <input type="text" id="loginName" placeholder="Ваше имя">
            <input type="text" id="loginPhone" placeholder="Номер телефона">
            <input type="email" id="loginEmail" placeholder="Email (нужен для чеков)">
            <button onclick="doLogin()">Войти</button>
        </div>
    </div>

    <div id="mainScreen" class="hidden">
        <div class="header">
            <h1>Магазин</h1>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('products')">Товары</div>
            <div class="tab" onclick="switchTab('cart')">Заказать</div>
            <div class="tab" onclick="switchTab('mycard')">Моя карта</div>
        </div>
        <div id="tabProducts"><div id="productsList"></div></div>
        <div id="tabCart" class="hidden"><div id="cartContent"></div></div>
        <div id="tabMyCard" class="hidden"><div id="myCardContent"></div></div>
        <button class="btn" style="width:100%; margin-top:12px; background:transparent; border:1px solid #2b9aff; color:#2b9aff;" onclick="alert('Ссылка на канал появится позже')">Посмотреть фото в канале</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://iiuahjmpszfcgtwapidt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iFYpqkv4D0qEOj4Dn1X9Nw_OH9d5Bji";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const starsContainer = document.getElementById('starsContainer');
    for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        starsContainer.appendChild(star);
    }

    let currentUser = JSON.parse(localStorage.getItem('store_client') || 'null');
    let cart = JSON.parse(localStorage.getItem('store_cart') || '[]');
    let products = [];

    async function loadProducts() {
        const { data } = await sb.from('store_products').select('*').order('code');
        products = data || [];
    }

    if (currentUser) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        loadProducts().then(renderProducts);
    }

    function doLogin() {
        const name = document.getElementById('loginName').value.trim();
        const phone = document.getElementById('loginPhone').value.trim();
        const email = document.getElementById('loginEmail').value.trim();
        if (!name || !phone || !email) return alert('Заполните все поля. Email обязателен.');
        if (!email.includes('@') || !email.includes('.')) return alert('Введите корректный Email.');
        currentUser = { name, phone, email };
        localStorage.setItem('store_client', JSON.stringify(currentUser));
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        loadProducts().then(renderProducts);
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('store_client');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('hidden');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
        document.getElementById('tabProducts').classList.toggle('hidden', tab !== 'products');
        document.getElementById('tabCart').classList.toggle('hidden', tab !== 'cart');
        document.getElementById('tabMyCard').classList.toggle('hidden', tab !== 'mycard');
        if (tab === 'cart') renderCart();
        if (tab === 'mycard') renderMyCard();
    }

    function renderProducts() {
        if (!products.length) {
            document.getElementById('productsList').innerHTML = '<p style="text-align:center;padding:20px;">Товары скоро появятся</p>';
            return;
        }
        document.getElementById('productsList').innerHTML = products.map(p => `
            <div class="product-item">
                <div><b>#${p.code} ${p.name}</b><br><small>${p.price} руб | В наличии: ${p.stock}</small></div>
                <button class="btn btn-small" onclick="addToCart('${p.code}')">В корзину</button>
            </div>
        `).join('');
    }

    function addToCart(code) {
        const p = products.find(pr => pr.code == code);
        if (!p || p.stock <= 0) return alert('Нет в наличии');
        const ex = cart.find(c => c.code == code);
        if (ex) { if (ex.qty >= p.stock) return alert('Больше нет'); ex.qty++; }
        else cart.push({ code: p.code, name: p.name, price: p.price, qty: 1 });
        localStorage.setItem('store_cart', JSON.stringify(cart));
        alert('Добавлено');
    }

    function renderCart() {
        if (cart.length === 0) { document.getElementById('cartContent').innerHTML = '<p style="text-align:center;padding:20px;">Корзина пуста</p>'; return; }
        let total = 0;
        document.getElementById('cartContent').innerHTML = cart.map((c, i) => {
            total += c.price * c.qty;
            return `<div class="product-item"><div><b>#${c.code} ${c.name}</b><br>${c.price} x ${c.qty} = ${c.price*c.qty} руб</div>
                <div style="display:flex;gap:4px;align-items:center;">
                    <input type="number" class="input-field" value="${c.qty}" min="1" onchange="updateQty(${i},this.value)">
                    <button class="btn btn-small" style="background:#ff3b30;" onclick="removeFromCart(${i})">X</button>
                </div></div>`;
        }).join('') + `<div class="cart-total">Итого: ${total} руб</div><button class="btn" onclick="placeOrder()" style="margin-top:12px;">Заказать</button>`;
    }

    function updateQty(i, v) { v = parseInt(v); if (isNaN(v) || v < 1) v = 1; cart[i].qty = v; localStorage.setItem('store_cart', JSON.stringify(cart)); renderCart(); }
    function removeFromCart(i) { cart.splice(i, 1); localStorage.setItem('store_cart', JSON.stringify(cart)); renderCart(); }

    function placeOrder() {
        const time = prompt('На какое время? (пока заглушка)') || 'не указано';
        const lines = cart.map(c => `#${c.code} ${c.name} - ${c.qty} шт`).join('\n');
        window.location.href = `mailto:?subject=Заказ&body=${encodeURIComponent('Здравствуйте, хочу заказать эти позиции на ' + time + ':\n\n' + lines + '\n\nС уважением, ' + currentUser.name)}`;
    }

    function renderMyCard() {
        document.getElementById('myCardContent').innerHTML = `<div class="card"><p><b>Имя:</b> ${currentUser.name}</p><p><b>Телефон:</b> ${currentUser.phone}</p><p><b>Email:</b> ${currentUser.email}</p><p><b>Карта:</b> ожидает активации в магазине</p></div>`;
    }
</script>
</body>
</html>
