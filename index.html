<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Магазин</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, sans-serif; }
        body { background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #03050b); color:#eef4ff; min-height:100vh; padding:12px; padding-bottom:80px; }
        .container { max-width:500px; margin:0 auto; }
        .login-card { background:rgba(31,44,56,0.9); border-radius:24px; padding:30px; border:1px solid #2b3b4c; text-align:center; margin-top:40px; }
        .login-card h1 { color:#2b9aff; margin-bottom:8px; }
        .login-card input { width:100%; padding:12px; margin-bottom:12px; background:#0e1621; border:1px solid #2b3b4c; border-radius:12px; color:#fff; }
        .login-card button { width:100%; padding:12px; background:#2b9aff; border:none; border-radius:12px; color:#fff; font-weight:600; cursor:pointer; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .header h1 { font-size:1.5rem; color:#2b9aff; }
        .btn-sm { padding:8px 16px; border-radius:20px; border:none; cursor:pointer; font-weight:600; font-size:0.8rem; }
        .btn-logout { background:#ff3b30; color:#fff; }
        .card { background:rgba(31,44,56,0.8); border-radius:20px; padding:16px; margin-bottom:12px; border:1px solid #2b3b4c; }
        .product-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #2b3b4c; }
        .btn { background:#2b9aff; border:none; border-radius:14px; padding:10px; color:#fff; font-weight:600; cursor:pointer; }
        .btn-small { padding:6px 12px; font-size:0.7rem; border-radius:10px; }
        .btn-danger { background:#ff3b30; }
        .input-field { width:60px; padding:6px; background:#0e1621; border:1px solid #2b3b4c; border-radius:8px; color:#fff; text-align:center; }
        .cart-total { margin-top:12px; padding-top:12px; border-top:1px solid #2b3b4c; font-weight:600; }
        .hidden { display:none !important; }
        .order-item { background:rgba(31,44,56,0.8); border-radius:16px; padding:14px; margin-bottom:10px; border:1px solid #2b3b4c; }
        .promo-field { display:flex; gap:8px; margin-bottom:12px; }
        .promo-field input { flex:1; padding:8px; background:#0e1621; border:1px solid #2b3b4c; border-radius:8px; color:#fff; }
        .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(31,44,56,0.95); border-top:1px solid #2b3b4c; display:flex; gap:8px; padding:10px 16px; z-index:50; }
        .bottom-btn { flex:1; text-align:center; padding:10px; border-radius:12px; background:#2b3b4c; border:none; color:#eef4ff; cursor:pointer; font-weight:500; font-size:0.75rem; }
        .bottom-btn.active { background:#2b9aff; }
        .store-badge { display:inline-block; padding:3px 8px; border-radius:8px; font-size:0.65rem; font-weight:600; }
        .store-open { background:#d4f5d4; color:#1a7a1a; }
        .store-closed { background:#ffe0e0; color:#c0392b; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginScreen" class="login-card">
        <h1>Магазин</h1>
        <p style="color:#8e9eae; margin-bottom:20px;">Войдите, чтобы продолжить</p>
        <input type="text" id="cName" placeholder="Ваше имя">
        <input type="text" id="cPhone" placeholder="Номер телефона">
        <input type="text" id="cCardLast4" placeholder="Последние 4 цифры карты (если есть)" maxlength="4">
        <button onclick="clientLogin()">Войти</button>
    </div>

    <div id="mainScreen" class="hidden">
        <div class="header">
            <h1>Магазин</h1>
            <div><span id="storeStatusBadge"></span> <button class="btn-sm btn-logout" onclick="clientLogout()">Выйти</button></div>
        </div>
        <div id="ctabProducts"><div id="productsList"></div></div>
        <div id="ctabCart" class="hidden"><div id="cartContent"></div></div>
        <div id="ctabProfile" class="hidden"><div id="profileContent"></div></div>
    </div>
</div>

<div class="bottom-bar" id="clientBottomBar" style="display:none;">
    <button class="bottom-btn active" onclick="clientTab('products')">Товары</button>
    <button class="bottom-btn" onclick="clientTab('cart')">Корзина</button>
    <button class="bottom-btn" onclick="clientTab('profile')">Профиль</button>
